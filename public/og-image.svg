<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="fillBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a73e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a73e8" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="fillRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d93025" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d93025" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="80" y="110" font-size="28" font-weight="600" fill="#1a73e8" letter-spacing="2">SIMULATOR</text>
    <text x="80" y="200" font-size="76" font-weight="700" fill="#202124">Rate Limiter Simulator</text>
    <text x="80" y="260" font-size="32" font-weight="500" fill="#3c4043">Visualize HTTP 429, 503, queueing, and</text>
    <text x="80" y="302" font-size="32" font-weight="500" fill="#3c4043">backend saturation in distributed systems.</text>
  </g>

  <g transform="translate(80, 360)">
    <rect x="0" y="0" width="1040" height="210" rx="16" fill="#ffffff" stroke="#dadce0" stroke-width="1"/>

    <g stroke="#e8eaed" stroke-width="1">
      <line x1="40" y1="40"  x2="1020" y2="40"/>
      <line x1="40" y1="90"  x2="1020" y2="90"/>
      <line x1="40" y1="140" x2="1020" y2="140"/>
    </g>

    <path d="M40 150 Q 140 80, 240 110 T 440 100 T 640 70 T 840 115 T 1020 95 L 1020 180 L 40 180 Z"
          fill="url(#fillBlue)" stroke="#1a73e8" stroke-width="2.5"/>

    <path d="M40 175 L 140 170 L 240 168 L 340 130 L 440 162 L 540 120 L 640 155 L 740 108 L 840 160 L 940 125 L 1020 158 L 1020 180 L 40 180 Z"
          fill="url(#fillRed)" stroke="#d93025" stroke-width="2"/>

    <path d="M40 177 L 200 176 L 380 175 L 560 173 L 740 170 L 920 168 L 1020 165"
          fill="none" stroke="#a142f4" stroke-width="2" stroke-dasharray="6 4"/>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="500">
      <circle cx="60"  cy="195" r="5" fill="#1a73e8"/><text x="75"  y="200" fill="#3c4043">Incoming traffic</text>
      <circle cx="260" cy="195" r="5" fill="#d93025"/><text x="275" y="200" fill="#3c4043">429 rate-limited</text>
      <circle cx="450" cy="195" r="5" fill="#a142f4"/><text x="465" y="200" fill="#3c4043">503 unavailable</text>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="1120" y="605" font-size="16" font-weight="500" fill="#5f6368" text-anchor="end">ratelimiter-simulator · open source</text>
  </g>
</svg>
